kind = "web"
previewPath = "/"
title = "生日通"
version = "1.0.0"
id = "artifacts/birthday-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22551

[services.development]
run = "pnpm --filter @workspace/birthday-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/birthday-app", "run", "build" ]
publicDir = "artifacts/birthday-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22551"
BASE_PATH = "/"
